          e("div",{className:"mnl"},"Gewicht (kg)"),
          e("input",{className:"inp",type:"number",step:"0.1",placeholder:"bv. 73.5",value:wIn,onChange:function(ev){setWIn(ev.target.value)},autoFocus:true}),
          e("button",{className:"mpbtn",onClick:logW},"Opslaan")
        )
      ):null
    ];
  }

  return e("div",{className:"ss"},
    e("div",{className:"hdr"},
      e("h1",{className:"h1"},tab==="planning"?"Week "+weekNr(mon):tab==="voeding"?"Voeding":"Progressie"),
      e("p",{className:"sub"},tab==="planning"?fmt(ds[0])+" \u2014 "+fmt(ds[6]):tab==="voeding"?FD[sel]+" "+ds[sel].getDate()+" "+MN[ds[sel].getMonth()]+(wd.sports[sel]?" \u00b7 "+slbl(sel):""):"Houd je voortgang bij")
    ),
    e("div",{className:"cnt"},
      tab==="planning"?planTab():tab==="voeding"?voedTab():progTab()
    ),
    e("div",{className:"nav"},
      [{id:"planning",l:"Planning"},{id:"voeding",l:"Voeding"},{id:"progressie",l:"Progressie"}].map(function(t){
        return e("div",{key:t.id,className:"ni",onClick:function(){setTab(t.id)}},
          e("div",{className:"ndot "+(tab===t.id?"on":"off")}),
          e("div",{className:"nlbl "+(tab===t.id?"on":"off")},t.l)
        )
      })
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
